[package]
name = "siem-parser"
version = "0.1.0"
edition = "2021"
authors = ["SIEM-Lite Team"]
description = "High-performance log parser and normalizer for SIEM-Lite"
license = "Apache-2.0"

[[bin]]
name = "siem-parser"
path = "src/main.rs"

[lib]
name = "siem_parser"
path = "src/lib.rs"

[dependencies]
# Async runtime
tokio = { version = "1.40", features = ["full"] }

# Сериализация
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["preserve_order"] }

# HTTP сервер для health/metrics
axum = { version = "0.7", features = ["tokio"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["trace", "compression-gzip"] }

# Kafka producer (rdkafka обёртка)
rdkafka = { version = "0.36", features = ["cmake-build", "ssl", "gssapi"] }

# PII маскирование — DFA regex без backtracking
regex-automata = { version = "0.4", features = ["dfa", "perf"] }
regex-syntax = "0.8"

# GeoIP
maxminddb = "0.23"

# UUID
uuid = { version = "1.11", features = ["v4", "fast-rng"] }

# Временны́е метки
chrono = { version = "0.4", features = ["serde"] }
time = { version = "0.3", features = ["serde", "parsing"] }

# Метрики
prometheus = { version = "0.13", features = ["process"] }

# Логирование
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"

# Ошибки
thiserror = "1.0"
anyhow = "1.0"

# Конфигурация
config = { version = "0.14", features = ["toml"] }

# Производительность
ahash = "0.8"
bytes = "1.8"
smallvec = "1.13"

# LRU кэш для enrichment
lru = "0.12"

# Protocol Buffers
prost = "0.13"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tokio-test = "0.4"
proptest = "1.5"

[[bench]]
name = "parse_benchmark"
harness = false

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"

[profile.release.package.regex-automata]
opt-level = 3

[profile.bench]
opt-level = 3
debug = true
