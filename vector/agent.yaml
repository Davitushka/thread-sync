# Vector Agent — sidecar на каждой ноде
# Версия: Vector 0.43.x
# Документация: https://vector.dev/docs/reference/configuration/

data_dir: /var/lib/vector

api:
  enabled: true
  address: "0.0.0.0:8686"
  playground: false

# ── SOURCES ──────────────────────────────────────────────────────────────────

sources:
  docker_logs:
    type: docker_logs
    docker_host: "unix:///var/run/docker.sock"
    include_labels:
      - "siem.enabled=true"
    exclude_containers:
      - "vector"
      - "redpanda"
      - "clickhouse"
    auto_partial_merge: true

  dotnet_http:
    type: http_server
    address: "0.0.0.0:9000"
    path: "/ingest"
    method: POST
    encoding:
      codec: json
    tls:
      enabled: false  # TLS termination на ingress/nginx

  syslog_udp:
    type: syslog
    address: "0.0.0.0:5140"
    mode: udp
    max_length: 102400

  postgres_audit:
    type: file
    include:
      - "/var/log/postgresql/audit/*.csv"
    read_from: beginning
    line_delimiter: "\n"

  redis_slowlog:
    type: redis
    url: "redis://redis:6379/0"
    key: "redis-slowlog-channel"
    data_type: list
    method: rpop

# ── TRANSFORMS ───────────────────────────────────────────────────────────────

transforms:
  add_host_metadata:
    type: remap
    inputs:
      - docker_logs
      - syslog_udp
      - postgres_audit
      - redis_slowlog
      - dotnet_http
    source: |
      # Добавляем метаданные хоста
      .agent_host = get_hostname!()
      .agent_version = "0.43.0"
      .ingest_ts = now()

      # Нормализуем timestamp — Vector будет пытаться распарсить .timestamp
      if !exists(.timestamp) {
        .timestamp = .ingest_ts
      }

      # Тег источника для маршрутизации
      if exists(.container_name) {
        .source_hint = "docker"
      } else if exists(.appname) {
        .source_hint = "syslog"
      } else {
        .source_hint = "http"
      }

  route_by_source:
    type: route
    inputs:
      - add_host_metadata
    route:
      dotnet: '.source_hint == "docker" && exists(.container_name) && match(string!(.container_name), r"(api|backend|signalr)")'
      postgres: '.source_hint == "docker" && exists(.container_name) && match(string!(.container_name), r"postgres")'
      redis: '.source_hint == "redis" || (exists(.container_name) && match(string!(.container_name), r"redis"))'
      default: 'true'

  sanitize_for_transit:
    type: remap
    inputs:
      - route_by_source._unmatched
      - route_by_source.dotnet
      - route_by_source.postgres
      - route_by_source.redis
    source: |
      # Удаляем служебные поля Vector перед отправкой
      del(.source_type)
      # Ограничиваем размер сообщения 64KB
      if exists(.message) && length(string!(.message)) > 65536 {
        .message = slice!(string!(.message), 0, 65533) + "..."
        .truncated = true
      }

# ── SINKS ────────────────────────────────────────────────────────────────────

sinks:
  to_aggregator:
    type: vector
    inputs:
      - sanitize_for_transit
    address: "vector-aggregator:6000"
    compression: gzip
    batch:
      max_bytes: 10485760   # 10MB
      max_events: 5000
      timeout_secs: 1
    buffer:
      type: disk
      max_size: 268435456   # 256MB disk buffer при потере связи
      when_full: block
    request:
      retry_attempts: 10
      retry_initial_backoff_secs: 1
      retry_max_duration_secs: 30
    tls:
      enabled: true
      ca_file: "/etc/vector/certs/ca.crt"
      crt_file: "/etc/vector/certs/agent.crt"
      key_file: "/etc/vector/certs/agent.key"
      verify_hostname: true

  # Self-monitoring: метрики самого агента
  internal_metrics:
    type: prometheus_exporter
    inputs:
      - internal_metrics_source
    address: "0.0.0.0:9598"

sources:
  internal_metrics_source:
    type: internal_metrics
    scrape_interval_secs: 15
