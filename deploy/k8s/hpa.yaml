---
# HPA для siem-parser: масштабирование по CPU (целевой 60%)
# При 10k EPS на 1 поде → автоматически добавляет реплики до maxReplicas=10
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: siem-parser-hpa
  namespace: siem-lite
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: siem-parser
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
# HPA для vector-aggregator: масштабирование по CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vector-aggregator-hpa
  namespace: siem-lite
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vector-aggregator
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
# HPA для detection-engine: масштабирование по CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: detection-engine-hpa
  namespace: siem-lite
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: detection-engine
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
