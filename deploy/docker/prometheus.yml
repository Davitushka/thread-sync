# Prometheus конфигурация для SIEM-Lite self-monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: siem-lite
    environment: production

rule_files:
  - /etc/prometheus/rules/*.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: siem-parser
    static_configs:
      - targets: ['siem-parser:9100']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: vector-aggregator
    static_configs:
      - targets: ['vector-aggregator:9598']
    scrape_interval: 15s

  - job_name: clickhouse
    static_configs:
      - targets: ['clickhouse:9363']  # clickhouse-exporter порт
    scrape_interval: 30s

  - job_name: redpanda
    static_configs:
      - targets: ['redpanda:9644']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']

  - job_name: detection-engine
    static_configs:
      - targets: ['detection-engine:9110']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
