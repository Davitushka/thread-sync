---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector-aggregator
  namespace: siem-lite
  labels:
    app: vector-aggregator
    app.kubernetes.io/component: ingestion
    app.kubernetes.io/part-of: siem-lite
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9598"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vector-aggregator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: vector-aggregator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9598"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: vector-aggregator
                topologyKey: kubernetes.io/hostname

      securityContext:
        runAsNonRoot: true
        runAsUser: 10003
        runAsGroup: 10003
        fsGroup: 10003
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: vector
          image: timberio/vector:0.43-alpine
          imagePullPolicy: IfNotPresent
          args: ["--config", "/etc/vector/aggregator.yaml"]
          ports:
            - name: vector
              containerPort: 6000
              protocol: TCP
            - name: http-ingest
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9598
              protocol: TCP
            - name: api
              containerPort: 8686
              protocol: TCP

          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8686
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8686
            initialDelaySeconds: 5
            periodSeconds: 10

          volumeMounts:
            - name: config
              mountPath: /etc/vector
              readOnly: true
            - name: data
              mountPath: /var/lib/vector

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]

      volumes:
        - name: config
          configMap:
            name: vector-aggregator-config
        - name: data
          emptyDir:
            sizeLimit: 4Gi

      terminationGracePeriodSeconds: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vector-aggregator-pdb
  namespace: siem-lite
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: vector-aggregator
