apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse-siem
    isDefault: true
    jsonData:
      host: clickhouse
      port: 8123
      username: siem
      defaultDatabase: siem
      protocol: http
      tlsSkipVerify: true
      logs:
        defaultTable: events
        otelEnabled: false
    secureJsonData:
      # Из env контейнера Grafana (docker-compose: CLICKHOUSE_DATASOURCE_PASSWORD). Форма $VAR — устойчивее при спецсимволах в пароле, чем ${VAR}.
      password: $CLICKHOUSE_DATASOURCE_PASSWORD

  - name: Prometheus
    type: prometheus
    uid: prometheus-siem
    url: http://prometheus:9090
    access: proxy
    jsonData:
      httpMethod: POST
      timeInterval: 15s

  - name: Loki
    type: loki
    uid: loki-siem
    # Без subpath: иначе проверки вида …/ready превращаются в /loki/ready → 404 у Loki
    url: http://loki:3100
    access: proxy
    jsonData:
      maxLines: 1000

  - name: Alertmanager
    type: alertmanager
    uid: alertmanager-siem
    url: http://alertmanager:9093
    access: proxy
    jsonData:
      implementation: prometheus
