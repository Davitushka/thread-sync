# Prometheus конфигурация для SIEM-Lite self-monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: siem-lite
    environment: production

rule_files:
  - /etc/prometheus/rules/*.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # Метрики siem-parser слушают тот же HTTP-сервер, что и /parse (порт 7000)
  - job_name: siem-parser
    static_configs:
      - targets: ['siem-parser:7000']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: vector-aggregator
    static_configs:
      - targets: ['vector-aggregator:9598']
    scrape_interval: 15s

  - job_name: clickhouse
    static_configs:
      - targets: ['clickhouse:9363']  # clickhouse-exporter порт
    scrape_interval: 30s

  # Redpanda v23+: публичные метрики (redpanda_*) на /public_metrics — их рекомендует vendor.
  # Внутренний /metrics (vectorized_*) и другие лейблы; старые запросы в дашбордах на них давали пустые графики.
  - job_name: redpanda
    static_configs:
      - targets: ['redpanda:9644']
    metrics_path: /public_metrics
    scrape_interval: 15s

  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']

  - job_name: detection-engine
    static_configs:
      - targets: ['detection-engine:9110']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: correlator
    static_configs:
      - targets: ['correlator:9111']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Grafana: метрики процесса и внутреннего состояния (дашборды «Grafana metrics», self-monitoring)
  - job_name: grafana
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: /metrics
    scrape_interval: 30s

  # ── Infrastructure exporters ───────────────────────────────────────────────

  # node-exporter: метрики хост-машины (CPU, RAM, disk, net, temperature)
  # scrape_interval=15s — баланс между актуальностью и нагрузкой на /proc
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          host: siem-host
    scrape_interval: 15s
    metrics_path: /metrics

  # cAdvisor: per-container CPU/mem/net/I/O
  # scrape_interval=15s — cAdvisor обновляет данные каждые housekeeping_interval=15s
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          host: siem-host
    scrape_interval: 15s
    metrics_path: /metrics
    # Убираем высококардинальные метрики cAdvisor, которые не нужны для SIEM мониторинга
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'container_(tasks_state|memory_failures_total|spec_.*)'
        action: drop
