# Correlator: единый Kafka consumer с правилами детекции → Alertmanager.
# Образ тот же, что и для legacy detector (Dockerfile.detection), точка входа — бинарь correlator.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: correlator
  namespace: siem-lite
  labels:
    app: correlator
    app.kubernetes.io/component: detection
    app.kubernetes.io/part-of: siem-lite
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9111"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: correlator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: correlator
        app.kubernetes.io/component: detection
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9111"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: correlator
                topologyKey: kubernetes.io/hostname

      securityContext:
        runAsNonRoot: true
        runAsUser: 10002
        runAsGroup: 10002
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: correlator
          image: detection-engine:latest
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/correlator"]
          ports:
            - name: http-metrics
              containerPort: 9111
              protocol: TCP

          envFrom:
            - configMapRef:
                name: correlator-config

          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: siem-secrets
                  key: redis-password

          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 9111
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 9111
            initialDelaySeconds: 5
            periodSeconds: 10

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]

      terminationGracePeriodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: correlator-pdb
  namespace: siem-lite
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: correlator
