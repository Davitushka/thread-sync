name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust: fmt / clippy / test / coverage ───────────────────────────────────
  rust:
    name: Rust CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-parser

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-parser

      - name: Install system dependencies (libsasl2 for rdkafka)
        run: sudo apt-get update && sudo apt-get install -y libsasl2-dev cmake

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run unit tests
        run: cargo test --lib --locked 2>&1 | tee /tmp/test-output.txt
        env:
          RUST_LOG: debug

      - name: Run integration tests
        run: cargo test --test integration_test --locked
        env:
          RUST_LOG: debug

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: |
          cargo llvm-cov --locked --lcov --output-path lcov.info \
            --ignore-filename-regex "main\.rs|benches/" 2>&1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: rust-parser/lcov.info
          flags: rust-parser
          fail_ci_if_error: false

      - name: Check coverage threshold (70%)
        run: |
          cargo llvm-cov --locked --summary-only 2>&1 | tee /tmp/cov.txt
          LINES=$(grep "TOTAL" /tmp/cov.txt | awk '{print $NF}' | tr -d '%')
          echo "Line coverage: ${LINES}%"
          if [ -n "$LINES" ] && (( $(echo "$LINES < 70" | bc -l) )); then
            echo "::error::Coverage ${LINES}% is below 70% threshold"
            exit 1
          fi

      - name: Security audit
        run: |
          cargo install cargo-audit --quiet
          cargo audit --deny warnings

  # ── Docker build: siem-parser ─────────────────────────────────────────────
  docker-parser:
    name: Docker Build (siem-parser)
    runs-on: ubuntu-latest
    needs: rust

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: rust-parser
          file: deploy/docker/Dockerfile.parser
          push: false
          tags: siem-parser:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Test container health endpoint
        run: |
          docker run -d --name siem-parser-test \
            -p 7000:7000 \
            -e SIEM__KAFKA__BOOTSTRAP_SERVERS=localhost:9092 \
            -e SIEM__PROCESSING__ENABLE_GEOIP=false \
            siem-parser:ci-${{ github.sha }}
          sleep 5
          curl --fail --retry 3 --retry-delay 2 http://localhost:7000/health
          docker stop siem-parser-test

  # ── Docker Compose validation ─────────────────────────────────────────────
  compose-validate:
    name: Docker Compose Config Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create placeholder secrets
        run: |
          mkdir -p deploy/docker/secrets
          echo -n "placeholder" > deploy/docker/secrets/smtp_password.txt
          echo -n "https://hooks.slack.com/placeholder" > deploy/docker/secrets/slack_webhook_url.txt
          echo -n "placeholder" > deploy/docker/secrets/pagerduty_key.txt
          echo -n "ClickHousePass123!" > deploy/docker/secrets/clickhouse_password.txt
          echo -n "MinIOSecret456!" > deploy/docker/secrets/minio_secret_key.txt

      - name: Validate docker-compose config
        run: docker compose -f deploy/docker/docker-compose.yml config --quiet

  # ── YAML lint: Sigma rules + Vector configs ────────────────────────────────
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint Sigma rules
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" \
            sigma-rules/*.yaml

      - name: Lint Vector configs
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" \
            vector/*.yaml

      - name: Lint Alertmanager config
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" \
            alerting/alertmanager.yaml

  # ── Detection Engine: Go ──────────────────────────────────────────────────
  detection-engine:
    name: Detection Engine (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: detection-engine

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: detection-engine/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: detection-engine
          version: v1.62

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Check coverage threshold (70%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Go coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "::error::Go coverage ${COVERAGE}% < 70%"
            exit 1
          fi
