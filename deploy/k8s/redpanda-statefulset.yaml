---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: siem-lite
  labels:
    app: redpanda
    app.kubernetes.io/component: queue
    app.kubernetes.io/part-of: siem-lite
spec:
  serviceName: redpanda-headless
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9644"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: redpanda
                topologyKey: kubernetes.io/hostname

      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
          command:
            - rpk
            - redpanda
            - start
            - --smp=1
            - --memory=1G
            - --reserve-memory=0M
            - --overprovisioned
            - --kafka-addr=0.0.0.0:9092
            - --advertise-kafka-addr=redpanda:9092
            - --pandaproxy-addr=0.0.0.0:8082
            - --advertise-pandaproxy-addr=redpanda:8082
            - --schema-registry-addr=0.0.0.0:8081
            - --rpc-addr=0.0.0.0:33145
            - --advertise-rpc-addr=redpanda:33145
          ports:
            - name: kafka
              containerPort: 9092
            - name: admin
              containerPort: 9644
            - name: proxy
              containerPort: 8082
            - name: schema
              containerPort: 8081
            - name: rpc
              containerPort: 33145

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"

          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "rpk cluster health --api-urls localhost:9644 2>&1 | grep -q 'Healthy'"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10

          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "rpk cluster info --api-urls localhost:9644 2>&1 | grep -q 'BROKER'"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]

      terminationGracePeriodSeconds: 60

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 20Gi
        storageClassName: standard
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: redpanda-pdb
  namespace: siem-lite
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: redpanda
