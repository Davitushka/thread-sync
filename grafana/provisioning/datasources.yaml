apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse-siem
    isDefault: true
    jsonData:
      host: clickhouse
      port: 8123
      username: siem
      defaultDatabase: siem
      protocol: http
      tlsSkipVerify: false
      logs:
        defaultTable: events
        otelEnabled: false
    secureJsonData:
      password: "${CLICKHOUSE_PASSWORD}"

  - name: Prometheus
    type: prometheus
    uid: prometheus-siem
    url: http://prometheus:9090
    access: proxy
    jsonData:
      httpMethod: POST
      timeInterval: 15s

  - name: Loki
    type: loki
    uid: loki-siem
    url: http://loki:3100
    access: proxy
    jsonData:
      maxLines: 1000

  - name: Alertmanager
    type: alertmanager
    uid: alertmanager-siem
    url: http://alertmanager:9093
    access: proxy
    jsonData:
      implementation: prometheus
