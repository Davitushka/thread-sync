# SIEM-Lite Docker Compose — production-ready конфигурация
# Требования: Docker 24+, Docker Compose v2.20+
# Команда запуска: docker compose -f deploy/docker/docker-compose.yml up -d
# Остановка: docker compose down --volumes (удаляет данные!)

x-common-env: &common-env
  TZ: UTC

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 60s

networks:
  siem-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  vector-data:
    driver: local
  redpanda-data:
    driver: local
  clickhouse-data-hot:
    driver: local
  clickhouse-config:
    driver: local
  grafana-data:
    driver: local
  prometheus-data:
    driver: local
  loki-data:
    driver: local
  minio-data:
    driver: local
  geoip-data:
    driver: local
  postgres-data:
    driver: local

secrets:
  smtp_password:
    file: ./secrets/smtp_password.txt
  slack_webhook_url:
    file: ./secrets/slack_webhook_url.txt
  pagerduty_key:
    file: ./secrets/pagerduty_key.txt
  clickhouse_password:
    file: ./secrets/clickhouse_password.txt
  minio_secret_key:
    file: ./secrets/minio_secret_key.txt

services:
  # ════════════════════════════════════════════════════════════════
  # Redpanda (Kafka-совместимый брокер, без JVM)
  # ════════════════════════════════════════════════════════════════
  redpanda:
    image: redpandadata/redpanda:v23.3.11
    container_name: siem-redpanda
    restart: unless-stopped
    networks:
      - siem-internal
    ports:
      - "9092:9092"    # Kafka protocol
      - "9644:9644"    # Admin API
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    command:
      - redpanda
      - start
      - --advertise-kafka-addr=redpanda:9092
      - --kafka-addr=0.0.0.0:9092
      - --smp=2
      - --memory=1G
      - --reserve-memory=200M
      - --overprovisioned
      # Тюнинг storage.commit-interval-ms / log_segment_size — через redpanda.yaml или rpk cluster config
      # (rpk redpanda start в v23.3 не поддерживает --set=key=value.)
    environment:
      <<: *common-env
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "rpk", "cluster", "info", "--brokers=localhost:9092"]
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1500M

  # Инициализация топиков Redpanda
  redpanda-init:
    image: redpandadata/redpanda:v23.3.11
    container_name: siem-redpanda-init
    networks:
      - siem-internal
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        rpk topic create siem.events \
          --brokers=redpanda:9092 \
          --partitions=12 \
          --replicas=1 \
          --topic-config=retention.ms=86400000 \
          --topic-config=segment.bytes=104857600 \
          --topic-config=compression.type=snappy || true

        rpk topic create siem.events.dlq \
          --brokers=redpanda:9092 \
          --partitions=4 \
          --replicas=1 \
          --topic-config=retention.ms=604800000 || true

        echo "Redpanda topics initialized"
    restart: "no"

  # ════════════════════════════════════════════════════════════════
  # ClickHouse — основное хранилище событий
  # ════════════════════════════════════════════════════════════════
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: siem-clickhouse
    restart: unless-stopped
    networks:
      - siem-internal
    ports:
      - "8123:8123"    # HTTP interface
      - "9000:9000"    # Native protocol
      - "9363:9363"    # Prometheus /metrics (self-monitoring)
    volumes:
      - clickhouse-data-hot:/var/lib/clickhouse
      - ../../clickhouse/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ../../clickhouse/02-kafka_ingest.sql:/docker-entrypoint-initdb.d/02-kafka_ingest.sql:ro
      - ./clickhouse/config.d/prometheus.xml:/etc/clickhouse-server/config.d/prometheus.xml:ro
    environment:
      <<: *common-env
      CLICKHOUSE_USER: siem
      CLICKHOUSE_PASSWORD: ClickHousePass123!
      CLICKHOUSE_DB: siem
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          memory: 2G
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ════════════════════════════════════════════════════════════════
  # PostgreSQL — кейсы SOC (case-management)
  # ════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: siem-postgres
    restart: unless-stopped
    networks:
      - siem-internal
    ports:
      - "5432:5432"
    environment:
      <<: *common-env
      POSTGRES_USER: siem_soc
      POSTGRES_PASSWORD: PostgresCases123!
      POSTGRES_DB: soc_cases
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 5
      test: ["CMD-SHELL", "pg_isready -U siem_soc -d soc_cases"]

  # ════════════════════════════════════════════════════════════════
  # Case management — API + UI (кейсы, Alertmanager webhook)
  # ════════════════════════════════════════════════════════════════
  case-management:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.casemgmt
    container_name: siem-case-management
    restart: unless-stopped
    networks:
      - siem-internal
    ports:
      - "8088:8088"
    environment:
      <<: *common-env
      RUST_LOG: case_management_rs=info
      CASEMGMT_DATABASE_URL: postgres://siem_soc:PostgresCases123!@postgres:5432/soc_cases?sslmode=disable
      CASEMGMT_HTTP_ADDR: "0.0.0.0:8088"
      CASEMGMT_GRAFANA_EXTERNAL_URL: "http://localhost:3000"
      CASEMGMT_AUTO_CASE_FROM_ALERTS: "true"
      CASEMGMT_AUTO_CASE_MIN_SEVERITY: "medium"
      CASEMGMT_DEFAULT_ACTOR: "alertmanager"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8088/health"]
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ════════════════════════════════════════════════════════════════
  # Redis — состояние для detection-engine / correlator
  # ════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: siem-redis
    restart: unless-stopped
    networks:
      - siem-internal
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 3
      test: ["CMD", "redis-cli", "ping"]

  # ════════════════════════════════════════════════════════════════
  # siem-parser — Rust binary для парсинга и нормализации
  # ════════════════════════════════════════════════════════════════
  siem-parser:
    build:
      context: ../../rust-parser
      dockerfile: ../deploy/docker/Dockerfile.parser
      target: runtime
    container_name: siem-parser
    restart: unless-stopped
    networks:
      - siem-internal
    ports:
      - "7000:7000"    # HTTP API
      - "9100:9100"    # Prometheus metrics
    volumes:
      - geoip-data:/etc/geoip:ro
    environment:
      <<: *common-env
      SIEM__KAFKA__BOOTSTRAP_SERVERS: redpanda:9092
      SIEM__KAFKA__TOPIC: siem.events
      SIEM__KAFKA__DLQ_TOPIC: siem.events.dlq
      SIEM__GEOIP__CITY_DB_PATH: /etc/geoip/GeoLite2-City.mmdb
      SIEM__GEOIP__ASN_DB_PATH: /etc/geoip/GeoLite2-ASN.mmdb
      SIEM__PROCESSING__ENABLE_PII_MASKING: "true"
      SIEM__PROCESSING__ENABLE_GEOIP: "true"
      SIEM__SERVER__WORKERS: "4"
      RUST_LOG: siem_parser=info,warn
      RUST_BACKTRACE: "1"
      # Для webhook /alerts/ingest → ClickHouse
      CLICKHOUSE_URL: "http://clickhouse:8123"
      CLICKHOUSE_USER: "siem"
      CLICKHOUSE_PASSWORD_FILE: /run/secrets/clickhouse_password
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7000/health"]
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
        reservations:
          cpus: "1"
          memory: 256M

  # ════════════════════════════════════════════════════════════════
  # Vector Aggregator
  # ════════════════════════════════════════════════════════════════
  vector-aggregator:
    image: timberio/vector:0.43.0-debian
    container_name: siem-vector-aggregator
    restart: unless-stopped
    networks:
      - siem-internal
    ports:
      - "6000:6000"    # Vector protocol (от агентов)
      - "8080:8080"    # HTTP ingest (NDJSON) для сидов / приложений
      - "8686:8686"    # Vector API
      - "9598:9598"    # Prometheus metrics
    volumes:
      - vector-data:/var/lib/vector
      - ../../vector/aggregator.yaml:/etc/vector/vector.yaml:ro
    environment:
      <<: *common-env
      VECTOR_LOG: info
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/8686'"]
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M

  # ════════════════════════════════════════════════════════════════
  # Демо-генератор логов (Rust siem-log-generator) → Vector → Kafka → ClickHouse
  # Переменные: SIEM_LOGGEN_* (см. log-generator/src/main.rs)
  # Отключить: docker compose stop siem-log-generator
  # ════════════════════════════════════════════════════════════════
  log-generator:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.loggen
    container_name: siem-log-generator
    restart: unless-stopped
    networks:
      - siem-internal
    environment:
      <<: *common-env
      RUST_LOG: siem_log_generator=info
      SIEM_LOGGEN_URL: http://vector-aggregator:8080/logs
      SIEM_LOGGEN_EPS: "18"
      SIEM_LOGGEN_BURST_SEC: "90"
      SIEM_LOGGEN_SLEEP_SEC: "8"
      SIEM_LOGGEN_THREAT_RATIO: "0.05"
      SIEM_LOGGEN_BATCH_SIZE: "100"
    depends_on:
      redpanda:
        condition: service_healthy
      vector-aggregator:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: 256M

  # ════════════════════════════════════════════════════════════════
  # MinIO — S3-совместимое хранилище для cold tier
  # ════════════════════════════════════════════════════════════════
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: siem-minio
    restart: unless-stopped
    networks:
      - siem-internal
    ports:
      - "9001:9001"    # Console UI
    volumes:
      - minio-data:/data
    environment:
      <<: *common-env
      MINIO_ROOT_USER: siemadmin
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_secret_key
    secrets:
      - minio_secret_key
    command: server /data --console-address ":9001"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "mc", "ready", "local"]
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ════════════════════════════════════════════════════════════════
  # Prometheus
  # ════════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: siem-prometheus
    restart: unless-stopped
    networks:
      - siem-internal
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../alerting/prometheus-rules.yaml:/etc/prometheus/rules/siem-rules.yaml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  # ════════════════════════════════════════════════════════════════
  # Alertmanager
  # ════════════════════════════════════════════════════════════════
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: siem-alertmanager
    restart: unless-stopped
    networks:
      - siem-internal
    ports:
      - "9093:9093"
    volumes:
      - ../../alerting/alertmanager.yaml:/etc/alertmanager/alertmanager.yaml:ro
      - ../../alerting/templates:/etc/alertmanager/templates:ro
    secrets:
      - smtp_password
      - slack_webhook_url
      - pagerduty_key
    depends_on:
      case-management:
        condition: service_started
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yaml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://alertmanager:9093'
      - '--cluster.advertise-address=0.0.0.0:9094'
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ════════════════════════════════════════════════════════════════
  # Loki — хранилище логов самой SIEM (не событий)
  # ════════════════════════════════════════════════════════════════
  loki:
    image: grafana/loki:3.3.0
    container_name: siem-loki
    restart: unless-stopped
    networks:
      - siem-internal
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
      - ./loki-config.yaml:/etc/loki/config.yaml:ro
    command: -config.file=/etc/loki/config.yaml
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ════════════════════════════════════════════════════════════════
  # Grafana — визуализация
  # ════════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:11.4.0
    container_name: siem-grafana
    restart: unless-stopped
    networks:
      - siem-internal
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../../grafana/provisioning/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ../../grafana/provisioning/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ../../grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      <<: *common-env
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/clickhouse_password
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/siem-overview.json"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_LOG_LEVEL: warn
      # ClickHouse datasource
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    secrets:
      - clickhouse_password
    depends_on:
      - clickhouse
      - prometheus
      - loki
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ── Detection Engine (Rust) ──────────────────────────────────────────────
  detection-engine:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.detection
    container_name: detection-engine
    restart: unless-stopped
    networks:
      - siem-internal
    environment:
      <<: *common-env
      RUST_LOG: detection_engine_rs=info,detector=info
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_TOPIC: siem.events
      KAFKA_GROUP_ID: detection-engine
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      METRICS_ADDR: ":9110"
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9110/health"]
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ════════════════════════════════════════════════════════════════
  # node-exporter — метрики хост-машины (CPU, RAM, disk, network)
  # ════════════════════════════════════════════════════════════════
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: siem-node-exporter
    restart: unless-stopped
    pid: host          # Доступ к PID namespace хоста для точных метрик процессов
    networks:
      - siem-internal
    ports:
      - "9101:9100"    # Не 9100 — занят siem-parser
    volumes:
      - /proc:/host/proc:ro       # Метрики процессов
      - /sys:/host/sys:ro         # Метрики ядра и устройств
      - /:/rootfs:ro              # Метрики файловой системы
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      # Игнорируем псевдо-ФС и виртуальные mount points
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)(/|$$)'
    healthcheck:
      interval: 30s
      timeout: 5s
      retries: 3
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9100/metrics"]
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 64M

  # ════════════════════════════════════════════════════════════════
  # cAdvisor — метрики контейнеров (CPU, mem, net, I/O per container)
  # ════════════════════════════════════════════════════════════════
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: siem-cadvisor
    restart: unless-stopped
    privileged: true      # Нужен для доступа к cgroup metrics
    networks:
      - siem-internal
    ports:
      - "8081:8080"       # Не 8080 — занят vector-aggregator
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      # На systemd-хостах добавить: - /cgroup:/cgroup:ro
    command:
      - '--housekeeping_interval=15s'    # Период сбора метрик
      - '--docker_only=true'             # Только Docker контейнеры (не все cgroup)
      - '--disable_metrics=percpu,sched,tcp,udp,disk,diskIO,hugetlb,referenced_memory,cpu_topology,resctrl'
      - '--store_container_labels=false' # Не сохранять все Docker labels в метрики (экономия кардинальности)
    healthcheck:
      interval: 30s
      timeout: 5s
      retries: 3
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 128M

  # ── Correlator (Rust) ────────────────────────────────────────────────────
  correlator:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.detection
    container_name: siem-correlator
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/correlator"]
    networks:
      - siem-internal
    environment:
      <<: *common-env
      RUST_LOG: detection_engine_rs=info,correlator=info
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_TOPIC: siem.events
      KAFKA_GROUP_ID: correlator
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      ALERTMANAGER_URL: http://alertmanager:9093
      CORRELATOR_HTTP_ADDR: ":9111"
      BRUTE_FORCE_THRESHOLD: "10"
      RATE_LIMIT_THRESHOLD: "500"
      LOG_LEVEL: "info"
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      alertmanager:
        condition: service_started
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9111/health"]
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ════════════════════════════════════════════════════════════════
  # SIEM Admin Panel — опциональная панель управления
  # Не запускается по умолчанию, чтобы основной сценарий оставался
  # таким же, как раньше: Grafana/Prometheus и весь SIEM-стек.
  # Запуск: docker compose --profile admin up -d siem-admin
  # UI: http://localhost:8089
  # ════════════════════════════════════════════════════════════════
  siem-admin:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.admin
    container_name: siem-admin
    restart: unless-stopped
    profiles: ["admin"]
    networks:
      - siem-internal
    ports:
      - "8089:8089"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      <<: *common-env
      RUST_LOG: siem_admin=info
      ADMIN_ADDR: "0.0.0.0:8089"
